global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'nestjs_app'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['info_api:3001']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['info_prometheus:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['info_cadvisor:8080']

  - job_name: 'redis'
    static_configs:
      - targets: ['info_redis_exporter:9121']

  - job_name: 'blackbox_health'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://info_api:3001/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: info_blackbox:9115
