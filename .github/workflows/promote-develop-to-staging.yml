name: Promote develop to staging

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - develop
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: promote-develop-to-staging
  cancel-in-progress: false

jobs:
  open-promotion-pr:
    name: Open promotion PR
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or reuse promotion PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          existing_pr="$(gh pr list \
            --base staging \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$existing_pr" ]; then
            echo "Promotion PR already open: #$existing_pr"
            exit 0
          fi

          gh pr create \
            --base staging \
            --head develop \
            --title "Promote develop to staging" \
            --body "$(cat <<'EOF'
          ## Summary
          - Promotes the latest validated changes from `develop` to `staging`.
          - This PR is created automatically after the `develop` CI succeeds.

          ## Validation
          - CI must pass again against `staging` before merge.
          EOF
          )"
